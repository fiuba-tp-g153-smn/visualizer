services:
  docs-service:
    container_name: docs-service-container
    build:
      context: ./docs-service
      dockerfile: Dockerfile
    ports:
      - "${DOCS_HOST_PORT}:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 10s
      start_interval: 1s

  visualizer:
    container_name: visualizer-container
    image: visualizer
    depends_on:
      docs-service:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BACKEND_BASE_URL=${BACKEND_BASE_URL}
        - USE_MOCK_TILES=${USE_MOCK_TILES}
        - TILE_FORMAT=${TILE_FORMAT}
        - APP_HOST_PORT=${APP_HOST_PORT}
        - DOCS_URL=${DOCS_URL}
    ports:
      - "${APP_HOST_PORT}:80"
    environment:
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - USE_MOCK_TILES=${USE_MOCK_TILES}
      - TILE_FORMAT=${TILE_FORMAT}
      - APP_HOST_PORT=${APP_HOST_PORT}
      - DOCS_URL=${DOCS_URL}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 10s
      start_interval: 1s
