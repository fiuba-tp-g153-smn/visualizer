services:
  visualizator:
    container_name: visualizator-container
    image: visualizator
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BACKEND_BASE_URL=${BACKEND_BASE_URL}
        - USE_MOCK_TILES=${USE_MOCK_TILES}
        - TILE_FORMAT=${TILE_FORMAT}
        - APP_HOST_PORT=${APP_HOST_PORT}
        - DOCS_URL=${DOCS_URL}
    ports:
      - "${APP_HOST_PORT}:80"
    environment:
      - BACKEND_BASE_URL=${BACKEND_BASE_URL}
      - USE_MOCK_TILES=${USE_MOCK_TILES}
      - TILE_FORMAT=${TILE_FORMAT}
      - APP_HOST_PORT=${APP_HOST_PORT}
      - DOCS_URL=${DOCS_URL}
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 2s
      timeout: 10s
      retries: 3

  docs:
    container_name: docs-container
    build:
      context: ./docs
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
