services:
  docs-service:
    container_name: docs-service-container
    build:
      context: ./docs-service
      dockerfile: Dockerfile
    ports:
      - "${DOCS_HOST_PORT}:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 10s
      start_interval: 1s

  visualizer:
    container_name: visualizer-container
    image: visualizer
    depends_on:
      docs-service:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATA_SERVICE_BASE_URL=${DATA_SERVICE_BASE_URL}
        - ALERTS_SERVICE_BASE_URL=${ALERTS_SERVICE_BASE_URL}
        - SMN_API_PROMPT_FOR_TOKEN=${SMN_API_PROMPT_FOR_TOKEN}
        - APP_HOST_PORT=${APP_HOST_PORT}
        - DOCS_URL=${DOCS_URL}
        - IGN_PLACE_SEARCH_URL=${IGN_PLACE_SEARCH_URL}
        - NOMINATIM_SEARCH_URL=${NOMINATIM_SEARCH_URL}
    ports:
      - "${APP_HOST_PORT}:80"
    environment:
      - DATA_SERVICE_BASE_URL=${DATA_SERVICE_BASE_URL}
      - ALERTS_SERVICE_BASE_URL=${ALERTS_SERVICE_BASE_URL}
      - SMN_API_PROMPT_FOR_TOKEN=${SMN_API_PROMPT_FOR_TOKEN}
      - APP_HOST_PORT=${APP_HOST_PORT}
      - DOCS_URL=${DOCS_URL}
      - IGN_PLACE_SEARCH_URL=${IGN_PLACE_SEARCH_URL}
      - NOMINATIM_SEARCH_URL=${NOMINATIM_SEARCH_URL}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 10s
      start_interval: 1s
