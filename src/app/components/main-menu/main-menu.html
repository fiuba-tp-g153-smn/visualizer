<div class="main-menu-wrapper">
  <!-- Barra de botones flotante -->
  <mat-card class="menu-button-bar">
    <!-- Logo SMN -->
    <div class="logo-container">
      <img src="icono.png" alt="Logo SMN" class="smn-logo" />
    </div>

    <div class="menu-divider"></div>

    <!-- Botones de secciones (dinámico) -->
    @for (section of sections; track section.id) {
    <button
      mat-icon-button
      class="menu-button"
      [class.active]="activePanel() === section.id"
      (click)="togglePanel(section.id)"
      [title]="section.tooltip"
    >
      <mat-icon>{{ section.icon }}</mat-icon>
    </button>
    }
  </mat-card>

  <!-- Panel lateral (se abre según botón activo) -->
  @if (getActiveSection(); as activeSection) {
  <div class="menu-panel">
    <div class="menu-header">
      <h2>{{ activeSection.title }}</h2>
      <button mat-icon-button (click)="closePanel()" class="close-button" aria-label="Cerrar menú">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="panel-content">
      <ng-container *ngComponentOutlet="activeSection.component" />
    </div>
  </div>
  }
</div>
