<div class="layer-list" [class.disabled-state]="!hasAvailableLayers()">
  @if (!hasAvailableLayers()) {
    <div class="empty-state-container">
      <mat-icon class="empty-icon">layers_clear</mat-icon>
      <h3>Sin capas disponibles</h3>
      <p>No hay capas configuradas para visualizar.</p>
    </div>
  } @else {
    <mat-tab-group class="layer-tabs" animationDuration="0ms">
      <!-- Tab: Capas Disponibles -->
      <mat-tab>
        <ng-template mat-tab-label>
          <div class="tab-label-container">
            <mat-icon class="tab-icon">grid_view</mat-icon>
            <span>Disponibles</span>
          </div>
        </ng-template>
        <div class="tab-content">
          <app-available-layers />
        </div>
      </mat-tab>

      <!-- Tab: Capas Activas -->
      <mat-tab>
        <ng-template mat-tab-label>
          <div class="tab-label-container">
            <mat-icon class="tab-icon">tune</mat-icon>
            <span>Activas</span>
            <span class="active-count" [class.visible]="getActiveLayersCount() > 0">
              {{ getActiveLayersCount() }}
            </span>
          </div>
        </ng-template>
        <div class="tab-content">
          <app-active-layers />
        </div>
      </mat-tab>
    </mat-tab-group>
  }
</div>
