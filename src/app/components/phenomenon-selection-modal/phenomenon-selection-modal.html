<div class="phenomenon-modal">
  <h2 mat-dialog-title>Seleccionar Fenómeno</h2>

  <mat-dialog-content>
    @if (loading) {
      <div class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
        <p>Cargando fenómenos...</p>
      </div>
    } @else if (error) {
      <div class="error-container">
        <mat-icon color="warn">error</mat-icon>
        <p>{{ error }}</p>
        <button mat-raised-button color="primary" (click)="loadPhenomena()">Reintentar</button>
      </div>
    } @else {
      <mat-list class="phenomena-list">
        @for (phenomenon of phenomena; track phenomenon.code) {
          <mat-list-item class="phenomenon-item" (click)="selectPhenomenon(phenomenon)">
            <div class="phenomenon-content">
              <span class="phenomenon-code">{{ phenomenon.code }}</span>
              <span class="phenomenon-description">{{ phenomenon.description }}</span>
            </div>
            <mat-icon class="select-icon">chevron_right</mat-icon>
          </mat-list-item>
          @if (!$last) {
            <mat-divider />
          }
        }
      </mat-list>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancelar</button>
  </mat-dialog-actions>
</div>
