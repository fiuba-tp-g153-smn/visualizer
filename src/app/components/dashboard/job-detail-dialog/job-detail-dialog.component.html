<h1 mat-dialog-title class="jd__title">
  <span class="jd__name" [title]="job.job_type">{{ title() }}</span>
  <span class="jd__pill" [class]="'jd__pill--' + job.outcome">{{ outcomeText() }}</span>
</h1>

<mat-dialog-content>
  <dl class="jd__grid">
    @for (row of rows(); track row.label) {
      <dt>{{ row.label }}</dt>
      <dd [title]="row.title ?? ''">{{ row.value }}</dd>
    }
  </dl>

  @if (job.error_message) {
    <div class="jd__error">
      <mat-icon>error_outline</mat-icon>
      <span>{{ job.error_message }}</span>
    </div>
  }

  <h2 class="jd__subtitle">Desglose por etapa</h2>
  <app-stage-pie-chart [stages]="job.stage_timings" [networkSecs]="job.download_s" />
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cerrar</button>
</mat-dialog-actions>
