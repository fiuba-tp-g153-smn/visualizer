<div class="live__stats">
  @for (stat of stats(); track stat.key) {
    <div class="live__stat">
      <div class="live__k">{{ stat.key }}</div>
      <div class="live__v">{{ stat.value }}</div>
      <div class="live__k">{{ stat.sub }}</div>
    </div>
  }
</div>

@if (inProgress().length) {
  <div class="live__scroll">
    <table class="live__table">
      <thead>
        <tr>
          <th>imagen</th>
          <th>banda</th>
          <th>estado</th>
          <th>desde</th>
        </tr>
      </thead>
      <tbody>
        @for (job of inProgress(); track job.image_id + '|' + job.band_id) {
          <tr>
            <td class="l"><span class="dot"></span>{{ job.image_id }}</td>
            <td class="l muted">{{ job.band_id }}</td>
            <td class="l muted">{{ job.status }}</td>
            <td class="r muted">{{ since(job.updated_at) }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
