<div class="overlay-layout">
  <div class="col-main">
    <div class="row-top">
      <app-main-menu />
      <div class="edit-zone">
        <app-map-edit-controls [visible]="isEditingPolygon()" (action)="handleEditAction($event)" />
      </div>
    </div>

    <div class="row-middle">
      <app-map-zoom-controls
        [visible]="isAppZoomVisible()"
        [currentZoom]="currentZoom()"
        [canZoomIn]="canZoomIn()"
        [canZoomOut]="canZoomOut()"
        (zoomIn)="zoomIn()"
        (zoomOut)="zoomOut()"
      />
    </div>

    <div class="row-bottom">
      <app-map-point-values
        [visible]="isViewerEnabled()"
        [entries]="floatingViewerEntries()"
        (close)="closeFloatingViewer($event)"
      />
    </div>
  </div>

  <div class="col-side">
    <app-map-scale-tools [visible]="isScaleToolsEnabled()" [entries]="scaleToolEntries()" />
    <app-map-attribution />
  </div>
</div>

<app-map-polygon-context-menu
  [state]="contextMenuState()"
  (close)="closeContextMenu()"
  (action)="handleContextMenuAction($event)"
/>
