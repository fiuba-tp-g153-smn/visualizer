@if (activeSection(); as section) {
  <mat-card class="menu-panel">
    <mat-toolbar class="menu-header">
      <span>{{ section.title }}</span>
      <button mat-icon-button (click)="closePanel()" aria-label="Cerrar menú">
        <mat-icon>close</mat-icon>
      </button>
    </mat-toolbar>

    <mat-card-content class="panel-content">
      <ng-container *ngComponentOutlet="section.component" />
    </mat-card-content>
  </mat-card>
}
