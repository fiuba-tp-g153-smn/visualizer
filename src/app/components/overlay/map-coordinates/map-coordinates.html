@if (visible()) {
  <div class="coordinates">
    <app-panel-close-button
      class="close-button"
      ariaLabel="Cerrar coordenadas"
      (pressed)="onClose()"
    />
    @if (latitude() !== null && longitude() !== null) {
      <span class="coord">Lat {{ latitude() | number: '1.4-4' }}°</span>
      <span class="separator">,</span>
      <span class="coord">Lon {{ longitude() | number: '1.4-4' }}°</span>
    } @else {
      <span class="coord placeholder">Lat --.----°</span>
      <span class="separator">,</span>
      <span class="coord placeholder">Lon --.----°</span>
    }
  </div>
}
