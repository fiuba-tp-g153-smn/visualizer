@if (visible) {
  <div class="point-panel">
    <app-panel-close-button
      class="close-button"
      ariaLabel="Cerrar panel de valor del punto"
      (pressed)="onClose()"
    />

    <span class="layer-name" [matTooltip]="layerName">{{ layerName }}</span>

    @if (isLoading) {
      <app-loading-spinner [diameter]="14" />
    } @else if (valueData) {
      <span class="value" [matTooltip]="valueTooltip">{{ formattedValue }}</span>
      <span class="unit">{{ displayUnit }}</span>
    } @else if (!data || data.status === PointQueryStatus.NO_DATA) {
      <span class="empty">Sin dato</span>
    } @else {
      <span class="empty">Error</span>
    }
  </div>
}
