<div class="layer-list">
  <h3>Capas</h3>

  <div class="layers-content">
    @for (group of layerService.layerGroups(); track group.id) {
    <div class="layer-group">
      <h4 class="group-name">{{ group.name }}</h4>

      @for (subgroup of group.subgroups; track subgroup.id) {
      <div class="subgroup">
        <h5 class="subgroup-name">{{ subgroup.name }}</h5>

        @for (layer of subgroup.layers; track layer.id) {
        <div class="layer-item" [class.active]="layer.visible">
          <div class="layer-header">
            <label class="layer-checkbox">
              <input
                type="checkbox"
                [checked]="layer.visible"
                (change)="layerService.toggleLayer(layer.id)"
              />
              <span class="layer-name">{{ layer.name }}</span>
            </label>

            <div class="layer-controls">
              <button
                class="btn-icon"
                (click)="layerService.moveLayerUp(layer.id)"
                [disabled]="!layer.visible"
                title="Subir capa"
              >
                ▲
              </button>
              <button
                class="btn-icon"
                (click)="layerService.moveLayerDown(layer.id)"
                [disabled]="!layer.visible"
                title="Bajar capa"
              >
                ▼
              </button>
            </div>
          </div>

          @if (layer.visible) {
          <div class="layer-opacity">
            <label class="opacity-label"> Opacidad: {{ layer.opacity }}% </label>
            <input
              type="range"
              min="0"
              max="100"
              [value]="layer.opacity"
              (input)="layerService.setOpacity(layer.id, +$any($event.target).value)"
              class="opacity-slider"
            />
          </div>
          }
        </div>
        }
      </div>
      }
    </div>
    }
  </div>
</div>
