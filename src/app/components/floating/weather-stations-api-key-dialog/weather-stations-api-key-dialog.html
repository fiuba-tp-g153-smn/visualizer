<h2 mat-dialog-title>
  <mat-icon class="dialog-icon">vpn_key</mat-icon>
  Clave de acceso a las estaciones meteorológicas
</h2>

<mat-dialog-content class="dialog-content">
  @if (reason) {
    <div class="dialog-reason" role="alert">
      <mat-icon class="reason-icon">error_outline</mat-icon>
      <span>{{ reason }}</span>
    </div>
  }

  <p class="dialog-description">
    Pegá la clave que te dieron para ver las estaciones del SMN. Queda
    guardada en este navegador.
  </p>

  <mat-form-field appearance="outline" class="key-field">
    <mat-label>Clave</mat-label>
    <input
      matInput
      type="password"
      [(ngModel)]="key"
      autocomplete="off"
      spellcheck="false"
      (keydown.enter)="save()"
    />
    <mat-icon matSuffix>vpn_key</mat-icon>
  </mat-form-field>

  <p class="dialog-hint">
    Si dejás de ver las estaciones, pedile una clave nueva al administrador
    del sistema.
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    [disabled]="!key().trim()"
    (click)="save()"
  >
    Guardar
  </button>
</mat-dialog-actions>
