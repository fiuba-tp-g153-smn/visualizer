<h2 mat-dialog-title class="dialog-title">
  <mat-icon class="dialog-icon">vpn_key</mat-icon>
  <span>Clave de acceso a las estaciones meteorológicas</span>
</h2>

<mat-dialog-content class="dialog-content">
  @if (reason) {
    <div class="dialog-reason" role="alert">
      <mat-icon class="reason-icon">error_outline</mat-icon>
      <span>{{ reason }}</span>
    </div>
  }

  <p class="dialog-description">
    Ingresá la clave de acceso al servicio de estaciones del SMN. Se guarda en el navegador.
  </p>

  <mat-form-field appearance="outline" class="key-field">
    <mat-label>Clave</mat-label>
    <input
      matInput
      type="password"
      [(ngModel)]="key"
      autocomplete="off"
      spellcheck="false"
      (keydown.enter)="save()"
    />
    <mat-icon matSuffix>vpn_key</mat-icon>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!key().trim()" (click)="save()">
    Guardar
  </button>
</mat-dialog-actions>
