@if (state(); as menuState) {
  <div class="context-menu-backdrop" (click)="onBackdropClick(); $event.stopPropagation()">
    <div
      class="context-menu-positioner"
      [style.left.px]="menuState.x"
      [style.top.px]="menuState.y"
      (click)="onMenuClick($event)"
    >
      <app-polygon-context-menu
        [polygonId]="menuState.polygonId"
        [polygonVisible]="menuState.polygonVisible"
        [hasDepartments]="menuState.hasDepartments"
        [departmentsVisible]="menuState.departmentsVisible"
        [canUndoCut]="menuState.canUndoCut"
        [isLoadingCut]="menuState.isLoadingCut"
        [isLoadingDepartments]="menuState.isLoadingDepartments"
        [isLoadingAlerts]="menuState.isLoadingAlerts"
        [exceedsMaxVertices]="menuState.exceedsMaxVertices"
        [maxVertices]="menuState.maxVertices"
        (action)="onAction($event)"
      />
    </div>
  </div>
}
