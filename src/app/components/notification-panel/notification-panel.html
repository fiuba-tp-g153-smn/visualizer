<div class="notification-container">
  @for (notification of notificationService.notifications(); track notification.id) {
    <div
      class="notification"
      [class.info]="notification.type === NotificationType.INFO"
      [class.warning]="notification.type === NotificationType.WARNING"
      [class.error]="notification.type === NotificationType.ERROR"
      [class.success]="notification.type === NotificationType.SUCCESS"
    >
      <div class="notification-content">
        <mat-icon class="notification-icon">{{ getIcon(notification.type) }}</mat-icon>
        <span class="notification-message">{{ notification.message }}</span>
      </div>
      <button
        mat-icon-button
        class="notification-close"
        (click)="notificationService.dismiss(notification.id)"
        aria-label="Cerrar notificación"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
  }
</div>
