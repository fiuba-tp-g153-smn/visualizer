<div id="map"></div>

<!-- UI Overlay Container - centralizes all floating elements -->
<div class="ui-overlay-container">
  <!-- Top row -->
  <div class="ui-row-top">
    <div class="ui-zone-start">
      @if (isEditingPolygon()) {
        <app-polygon-edit-controls (action)="handleEditAction($event)"></app-polygon-edit-controls>
      }
    </div>
  </div>

  <!-- Bottom row -->
  <div class="ui-row-bottom">
    <div class="ui-zone-start">
      <!-- Point value viewer (floating panels) -->
      @if (isViewerEnabled()) {
        <div class="point-value-container">
          @for (entry of floatingViewerEntries(); track entry.layerId) {
            <app-point-value-panel
              [visible]="true"
              [isLoading]="entry.isLoading"
              [layerName]="entry.layerName"
              [data]="entry.data"
              (close)="closeFloatingViewer(entry.layerId)"
            />
          }
        </div>
      }
    </div>

    <div class="ui-zone-end">
      <!-- Zoom controls -->
      @if (isAppZoomVisible()) {
        <div class="zoom-controls">
          <button mat-icon-button class="zoom-button" (click)="zoomIn()" [disabled]="!canZoomIn()">
            <mat-icon>add</mat-icon>
          </button>
          <div class="zoom-level">{{ currentZoom() }}</div>
          <button
            mat-icon-button
            class="zoom-button"
            (click)="zoomOut()"
            [disabled]="!canZoomOut()"
          >
            <mat-icon>remove</mat-icon>
          </button>
        </div>
      }
    </div>
  </div>

  <!-- Right side - Scale panels -->
  @if (isScaleToolsEnabled()) {
    <div class="ui-zone-end-full">
      <div class="scale-tools-container">
        @for (entry of scaleToolEntries(); track entry.layerId) {
          <app-scale-tool-panel [entry]="entry" />
        }
      </div>
    </div>
  }
</div>
