<div id="map"></div>

<!-- Edit controls - shown when editing a polygon -->
@if (isEditingPolygon()) {
  <div class="edit-controls-container">
    <app-polygon-edit-controls (action)="handleEditAction($event)"></app-polygon-edit-controls>
  </div>
}
<div class="point-value-container">
  <app-point-value-panel
    [visible]="isFloatingViewerEnabled() && isPointPanelVisible()"
    [isLoading]="isPointPanelLoading()"
    [currentIndex]="carouselIndex()"
    [total]="activeDataLayers().length"
    [data]="pointQueryResult()"
    (previous)="showPreviousLayerValue()"
    (next)="showNextLayerValue()"
  />
</div>

<div class="zoom-controls">
  <button mat-icon-button class="zoom-button" (click)="zoomIn()" [disabled]="!canZoomIn()">
    <mat-icon>add</mat-icon>
  </button>
  <div class="zoom-level">{{ currentZoom() }}</div>
  <button mat-icon-button class="zoom-button" (click)="zoomOut()" [disabled]="!canZoomOut()">
    <mat-icon>remove</mat-icon>
  </button>
</div>
