<div class="dash">
  <header class="dash__head">
    <button mat-icon-button (click)="goBack()" aria-label="Volver" matTooltip="Ir al mapa">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span class="dash__brand">
      <span
        class="dash__status"
        [class.dash__status--up]="online() === true"
        [class.dash__status--down]="online() === false"
        [matTooltip]="
          online() === false
            ? 'Servicio de métricas sin conexión'
            : online() === true
              ? 'Servicio de métricas operativo'
              : 'Conectando…'
        "
      ></span>
      <span class="dash__title">Panel de rendimiento y estado del procesamiento</span>
    </span>
    <span class="dash__spacer"></span>

    <label class="dash__ctl"
      >ventana
      <select [value]="windowHours()" (change)="onWindowChange($event)">
        <option value="24">24h</option>
        <option value="168">7d</option>
        <option value="0">todo</option>
      </select>
    </label>
    <label class="dash__ctl"
      >intervalo
      <select [value]="bucket()" (change)="onBucketChange($event)">
        <option value="hour">hora</option>
        <option value="day">día</option>
      </select>
    </label>
    <label class="dash__ctl"
      >Actualización cada
      <select [value]="refreshSecs()" (change)="onRefreshChange($event)">
        <option value="0">no</option>
        <option value="10">10s</option>
        <option value="30">30s</option>
        <option value="60">60s</option>
      </select>
    </label>
    <div class="dash__refresh-wrap">
      <button mat-stroked-button class="dash__refresh" (click)="refreshNow()" [disabled]="loading()">
        <span class="dash__refresh-glyph">
          @if (loading()) {
            <mat-spinner diameter="16" />
          } @else {
            <mat-icon>refresh</mat-icon>
          }
        </span>
        Actualizar
      </button>
      <span class="dash__updated">Actualizado {{ updatedAt() }}</span>
    </div>
  </header>

  <main class="dash__body">
    @if (errorMsg(); as err) {
      <div class="dash__error" role="alert">
        <mat-icon>error_outline</mat-icon>
        <span>No se pudieron actualizar las métricas: {{ err }}</span>
        <button mat-button (click)="refreshNow()" [disabled]="loading()">Reintentar</button>
      </div>
    }

    @if (firstLoad()) {
      <div class="dash__loading">
        <mat-spinner diameter="40" />
        <span>Cargando métricas…</span>
      </div>
    } @else {
      <app-metric-panel
        title="Resumen general"
        tip="Totales del período seleccionado (ventana): trabajos finalizados, tasa de éxito, fallos, descartes (DLQ), reencolados y omitidos, más la cantidad de tipos de trabajo activos."
      >
        <app-metric-stat-cards [summary]="summary()" />
      </app-metric-panel>

      <app-metric-panel
        title="En vivo · cola y en proceso"
        tip="Estado en tiempo real: profundidad de la cola de trabajo y de la cola de descartes (RabbitMQ), y los trabajos que se están procesando ahora mismo (rastreador de progreso). Muestra 'N/A' si RabbitMQ no responde."
      >
        <app-live-status-panel [live]="live()" />
      </app-metric-panel>

      <app-metric-panel
        title="Tendencias de tiempos"
        tip="Cómo evolucionan los tiempos de procesamiento a lo largo del tiempo, agrupados por intervalo (hora/día) y tipo de trabajo. Se calculan solo sobre trabajos exitosos."
      >
        <app-trend-charts [timing]="timing()" [throughput]="throughput()" />
      </app-metric-panel>

      <app-metric-panel
        title="Throughput · cada 10 min"
        tip="Evolución del throughput en una ventana corta con intervalos de 10 minutos: trabajos finalizados por cada bloque de 10 min y por tipo de trabajo. Útil para ver picos y huecos recientes que la vista por hora suaviza."
      >
        <label panelActions class="dash__ctl"
          >rango
          <select [value]="tpWindowHours()" (change)="onTpWindowChange($event)">
            <option value="1">1h</option>
            <option value="3">3h</option>
            <option value="6">6h</option>
            <option value="12">12h</option>
          </select>
        </label>
        <div class="dash__tp10">
          @if (tp10Options(); as opts) {
            <app-metric-chart [options]="opts" />
          } @else {
            <div class="dash__note">Sin trabajos en este rango.</div>
          }
        </div>
      </app-metric-panel>

      <app-metric-panel
        title="Por tipo de trabajo · tiempos y resultados"
        tip="Estadísticas agregadas por tipo de trabajo: conteos por resultado, % de error y distribución de tiempos (prom/mín/máx/p95). Los tiempos se calculan solo sobre trabajos exitosos. Clic en una columna para ordenar; clic en una fila para ver el desglose por etapa."
      >
        <div class="dash__scroll-x">
          <app-job-type-summary-table
            [summary]="summary()"
            (typeClick)="onSummaryTypeClick($event)"
          />
        </div>
      </app-metric-panel>

      <app-metric-panel
        title="Trabajos recientes"
        tip="Últimos trabajos finalizados (todos los resultados), del más nuevo al más viejo. Clic en las columnas para ordenar; clic en una fila para ver el detalle; 'cargar más' trae las siguientes 50 filas."
      >
        <label panelActions class="dash__ctl"
          >resultado
          <select [value]="outcomeFilter()" (change)="onOutcomeFilterChange($event)">
            <option value="">todos</option>
            @for (opt of outcomeOptions; track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </label>
        <label panelActions class="dash__ctl"
          >tipo
          <select [value]="typeFilter()" (change)="onTypeFilterChange($event)">
            <option value="">todos</option>
            @for (opt of jobTypeOptions(); track opt.value) {
              <option [value]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </label>
        <app-recent-jobs-table [jobs]="jobs()" [hasMore]="jobsHasMore()" (loadMore)="onLoadMore()" />
      </app-metric-panel>
    }
  </main>
</div>
