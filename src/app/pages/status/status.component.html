<div class="status">
  <header class="status__bar">
    <button mat-icon-button (click)="goBack()" aria-label="Volver" matTooltip="Ir al mapa">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="status__tabs" role="tablist" aria-label="Paneles de estado">
      <a
        class="status__tab"
        role="tab"
        routerLink="processing"
        routerLinkActive="status__tab--active"
        [routerLinkActiveOptions]="{ exact: true }"
        #rlaProcessing="routerLinkActive"
        [attr.aria-selected]="rlaProcessing.isActive"
      >
        <mat-icon>assessment</mat-icon>
        <span>Procesamiento</span>
      </a>
      <a
        class="status__tab"
        role="tab"
        routerLink="cache"
        routerLinkActive="status__tab--active"
        [routerLinkActiveOptions]="{ exact: true }"
        #rlaCache="routerLinkActive"
        [attr.aria-selected]="rlaCache.isActive"
      >
        <mat-icon>save_clock</mat-icon>
        <span>Caché</span>
      </a>
      <a
        class="status__tab"
        role="tab"
        routerLink="basemap"
        routerLinkActive="status__tab--active"
        [routerLinkActiveOptions]="{ exact: true }"
        #rlaBasemap="routerLinkActive"
        [attr.aria-selected]="rlaBasemap.isActive"
      >
        <mat-icon>layers</mat-icon>
        <span>Mapas base</span>
      </a>
    </div>
  </header>

  <div class="status__body">
    <router-outlet />
  </div>
</div>
