<div class="status">
  <header class="status__bar">
    <button mat-icon-button (click)="goBack()" aria-label="Volver" matTooltip="Ir al mapa">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="status__tabs" role="tablist" aria-label="Paneles de estado">
      <button
        class="status__tab"
        role="tab"
        type="button"
        [class.status__tab--active]="tab() === 'processing'"
        [attr.aria-selected]="tab() === 'processing'"
        (click)="setTab('processing')"
      >
        <mat-icon>assessment</mat-icon>
        <span>Procesamiento</span>
      </button>
      <button
        class="status__tab"
        role="tab"
        type="button"
        [class.status__tab--active]="tab() === 'cache'"
        [attr.aria-selected]="tab() === 'cache'"
        (click)="setTab('cache')"
      >
        <mat-icon>save_clock</mat-icon>
        <span>Caché</span>
      </button>
      <button
        class="status__tab"
        role="tab"
        type="button"
        [class.status__tab--active]="tab() === 'basemap'"
        [attr.aria-selected]="tab() === 'basemap'"
        (click)="setTab('basemap')"
      >
        <mat-icon>layers</mat-icon>
        <span>Mapas base</span>
      </button>
    </div>
  </header>

  <div class="status__body">
    @if (tab() === 'processing') {
      <app-dashboard />
    } @else if (tab() === 'cache') {
      <app-data-dashboard />
    } @else {
      <app-basemap-dashboard />
    }
  </div>
</div>
