<div class="docs-container" [class.light-mode]="!isDarkMode">
  <aside class="sidebar">
    <div class="sidebar-header d-flex justify-content-between align-items-center">
      <a routerLink="/" class="back-link">
        <mat-icon>arrow_back</mat-icon>
        Back to App
      </a>
      <h2>Documentation</h2>
      <button
        mat-icon-button
        (click)="toggleTheme()"
        [matTooltip]="isDarkMode ? 'Light Mode' : 'Dark Mode'"
      >
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li *ngFor="let topic of topics">
          <button [class.active]="topic.id === activeTopic" (click)="selectTopic(topic.id)">
            {{ topic.title }}
          </button>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="content-area">
    <div class="markdown-wrapper">
      <markdown [src]="currentDocUrl"></markdown>
    </div>
  </main>
</div>
