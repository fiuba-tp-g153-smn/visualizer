<mat-card class="main-menu-container">

    <img src="icono.png" alt="Logo SMN" class="smn-logo" />
  </div>

  <div class="menu-divider"></div>

  <app-menu-button text-hover="Capas del mapa" (click)="layersClick.emit()">

  <app-menu-button text-hover="Herramienta de polígonos" (click)="polygonsClick.emit()">

  </app-menu-button>

  </app-menu-button>
</mat-card>
