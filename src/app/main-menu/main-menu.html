<div class="main-menu-wrapper">
  <app-main-menu-button-bar 
    (layersClick)="openPanel('layers')"
    (polygonsClick)="openPanel('polygons')"
    (tilesClick)="openPanel('tiles')" />

  @if (activePanel()) {
    <div class="menu-panel">
      <div class="menu-header">
        <h2>{{ getPanelTitle() }}</h2>
        <button 
          mat-icon-button 
          (click)="closePanel()"
          class="close-button"
          aria-label="Cerrar menú">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="panel-content">
        @switch (activePanel()) {
          @case ('layers') {
            <app-layer-list />
          }
          @case ('polygons') {
            <app-polygon-tool />
          }
          @case ('tiles') {
            <app-tile-config (tileProviderChanged)="onTileProviderChanged($event)" />
          }
        }
      </div>
    </div>
  }
</div>
