<div class="main-menu-wrapper">
  <app-main-menu-button-bar (layerMenuClick)="toggleLayerList()" />

  @if (isLayerListVisible()) {
    <div class="layer-list-wrapper" (click)="$event.stopPropagation()">
      <app-layer-list />
    </div>
  }
</div>

@if (isLayerListVisible()) {
  <div class="overlay" (click)="closeLayerList()"></div>
}
