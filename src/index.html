    <!-- Static loading splash: painted straight from HTML/CSS before any JS runs
         (no Angular). The App component removes #app-splash once the app is
         stable. Replaces the former separate loader Angular app, which forced a
         second bootstrap and a duplicate /basemap/providers fetch. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #242c4f;
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }
      #app-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash img {
        width: 120px;
        height: 120px;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
        animation: app-splash-pulse 1.5s ease-in-out infinite;
      }
      @keyframes app-splash-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
    </style>
  </head>
