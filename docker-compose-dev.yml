services:
  docs-service:
    container_name: docs-service-dev-container
    build:
      context: ./docs-service
      dockerfile: Dockerfile.dev
    ports:
      - "${DOCS_HOST_PORT}:3000"
    volumes:
      - ./docs-service:/app
      - docs_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        if cmp -s package-lock.json node_modules/.deps-installed 2>/dev/null; then
          echo "✅ docs-service deps already current — skipping install"
        else
          echo "📦 docs-service deps changed — running npm ci..."
          npm ci && cp package-lock.json node_modules/.deps-installed
        fi
        exec npm start -- --host 0.0.0.0 --port 3000
    environment:
      - NODE_ENV=development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
      start_interval: 1s

  visualizer:
    container_name: visualizer-dev-container
    depends_on:
      docs-service:
        condition: service_started
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4200:4200"
    environment:
      - DATA_SERVICE_BASE_URL=${DATA_SERVICE_BASE_URL}
      - ALERTS_SERVICE_BASE_URL=${ALERTS_SERVICE_BASE_URL}
      - SMN_API_PROMPT_FOR_TOKEN=${SMN_API_PROMPT_FOR_TOKEN}
      - APP_HOST_PORT=${APP_HOST_PORT}
      - DOCS_URL=${DOCS_URL}
    volumes:
      - .:/app
      - visualizer_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        if cmp -s package-lock.json node_modules/.deps-installed 2>/dev/null; then
          echo "✅ visualizer deps already current — skipping install"
        else
          echo "📦 visualizer deps changed — running npm ci..."
          npm ci && cp package-lock.json node_modules/.deps-installed
        fi
        exec npm start -- --host 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:4200 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
      start_interval: 1s

volumes:
  docs_node_modules:
  visualizer_node_modules:
