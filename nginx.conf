server {
    # Listen on port 80 (standard HTTP port)
    listen 80;
    server_name localhost;

    # Where the built Angular application is located
    root /usr/share/nginx/html;
    index index.html;

    # Handle all incoming requests
    location / {
        # Try to serve requested file ($uri) or directory ($uri/).
        # If not found, fall back to index.html (crucial for Angular/SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Error pages configuration
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
