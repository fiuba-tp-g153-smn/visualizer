server {
    # Listen on port 80 (standard HTTP port)
    listen 80;
    server_name localhost;

    # Where the built Angular application is located
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──
    # gzip_proxied any is required: Coolify's reverse proxy fronts this nginx and
    # forwards a Via header, which would otherwise disable gzip for every request.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json
        font/ttf
        font/otf;

    # ── Caching ──────────────────────────────────────────────────────────────
    # Build outputs are content-hashed (outputHashing: all), so a new deploy
    # produces new filenames — these can be cached forever.
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Unhashed assets copied verbatim from public/ — moderate TTL (1 week).
    location = /icono.png  { add_header Cache-Control "public, max-age=604800"; }
    location = /favicon.ico { add_header Cache-Control "public, max-age=604800"; }

    # Handle all incoming requests
    location / {
        # The SPA shell must always revalidate so new deploys are picked up
        # immediately (index.html itself is not content-hashed).
        add_header Cache-Control "no-cache";
        # Try to serve requested file ($uri) or directory ($uri/).
        # If not found, fall back to index.html (crucial for Angular/SPA routing)
        try_files $uri $uri/ /index.html;
    }

    # Error pages configuration
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
